<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — JojoKicks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="jk-header"></div>

<div class="auth">
  <div class="auth-side">
    <div class="quote">
      <h2>欢迎回到<br><span class="accent">JojoKicks</span></h2>
      <p>登录后可查看订单、追踪物流、管理你的 wishlist，并享受 JojoClub 会员专属权益。</p>
      <div style="margin-top:40px;display:flex;gap:20px">
        <div>
          <div style="font-size:32px;font-weight:800;color:var(--gold)">12K+</div>
          <div style="font-size:12px;color:var(--text-soft)">5 星好评</div>
        </div>
        <div>
          <div style="font-size:32px;font-weight:800;color:var(--gold)">100%</div>
          <div style="font-size:12px;color:var(--text-soft)">正品保证</div>
        </div>
        <div>
          <div style="font-size:32px;font-weight:800;color:var(--gold)">24h</div>
          <div style="font-size:12px;color:var(--text-soft)">极速发货</div>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-form">
    <div class="auth-form-inner">
      <h2>登录账号</h2>
      <p class="sub">还没有账号？<a href="register.html" style="color:var(--gold);font-weight:600">立即注册 →</a></p>

      <form onsubmit="event.preventDefault(); location.href='account.html'">
        <div class="field">
          <label>邮箱</label>
          <input type="email" placeholder="you@email.com" required>
        </div>
        <div class="field">
          <label>密码</label>
          <input type="password" placeholder="输入密码" required>
        </div>
        <div class="row">
          <label><input type="checkbox" style="accent-color:var(--gold)"> 记住我</label>
          <a href="#" style="color:var(--text-soft)">忘记密码？</a>
        </div>
        <button class="btn btn-gold btn-block btn-lg" type="submit">登录</button>
      </form>

      <div class="divider"><span>或使用以下方式登录</span></div>

      <div class="social-btns">
        <button>🍎 Apple</button>
        <button>🟦 Google</button>
        <button>📘 Facebook</button>
        <button>🐦 Twitter</button>
      </div>

      <p style="margin-top:24px;font-size:12px;color:var(--text-mute);text-align:center">
        登录即表示同意 JojoKicks 的 <a href="terms.html" style="color:var(--gold)">服务条款</a> 与 <a href="privacy.html" style="color:var(--gold)">隐私政策</a>
      </p>
    </div>
  </div>
</div>

<div id="jk-footer"></div>
<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
