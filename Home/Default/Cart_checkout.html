<style>
.steps {
  display: flex;
  width: 100%;
  background: #e6e6e6;
  font-size: 14px;
  line-height: 40px;
}

.step {
  position: relative;
  flex: 1;
  padding-left: 20px;
  background: #d9d9d9;
  color: #333;
}

/* 箭头效果 */
.step::after {
  content: '';
  position: absolute;
  top: 0;
  right: -20px;
  width: 0;
  height: 0;
  border-top: 20px solid transparent;
  border-bottom: 20px solid transparent;
  border-left: 20px solid #d9d9d9;
  z-index: 2;
}

.step::before {
  content: '';
  position: absolute;
  top: 0;
  right: -21px;
  width: 0;
  height: 0;
  border-top: 20px solid transparent;
  border-bottom: 20px solid transparent;
  border-left: 20px solid #e6e6e6;
  z-index: 1;
}

/* 最后一个不需要箭头 */
.step:last-child::after,
.step:last-child::before {
  display: none;
}

/* 当前步骤 */
.step.active {
  background: #bfbfbf;
  font-weight: bold;
}

.step.active::after {
  border-left-color: #bfbfbf;
}

.num {
  margin-right: 4px;
}
</style>

<script>
function validate_isAddress(txt){
	var e = txt
	, t = e.match(/[0-9]/g)
	, i = e.match(/[０-９]/g);
	t || i || 2;
	if(t || i){
		return 1;
	}else{
		return 2;
	}
}
window.$yubin = function (t) {};
$(".zipcode").click(function(){
    var zip1=$("#zip1").val();
    var zip2=$("#zip2").val();
    var zip=zip1+zip2;
    if(zip1.length !=3){
        layer.tips('郵便番号', 'input[name="zip1"]', { tips: [1, 'red'], time: 3000});
        return false;
    }
    if(zip2.length !=4){
        layer.tips('郵便番号', 'input[name="zip2"]', { tips: [1, 'red'], time: 3000});
    }
    if(zip1.length ==3){
        var t=zip1;
        var xhr = new XMLHttpRequest(); 
        xhr.open('GET', "<?php echo $site_url;?>/style/assets/data/"+t+".js", true); 
        xhr.onreadystatechange = function() { 
            if (xhr.readyState === 4 && xhr.status === 200) { 
                var  addressFunctionString = xhr.responseText;
                var addressMap = JSON.parse(addressFunctionString.replace("$yubin(", "").replace(");", ""));
                var addressData = addressMap[zip];
                if(addressData === undefined){
                    art.dialog({ lock:true,icon: 'error',time:'2',content: '郵便番号が分からない方はこちら'});
                    layer.tips('郵便番号が分からない方はこちら', 'input[name="zip2"]', { tips: [1, 'red'], time: 3000});
                    return false;
                }
                var  prefecture = PREFECTURES[addressData[0]];
                $("#province").find("option").each(function(){
                if($(this).text() == prefecture)    {
                    $(this).prop("selected","selected");
                }
                });
                $("#zip").val(zip);
                $("#address1").val(addressData[1]);
                $("#address2").val(addressData[2]);
                if(addressData[3] != undefined){
                $("#address3").val(addressData[3]);
                }
                }
            }; 
        xhr.send(null);
    }
});
</script>
