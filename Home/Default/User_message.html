<include file="Home:head"/>
<body data-page="message">

<div class="notice-bar">期間限定：全品送料無料キャンペーン実施中｜会員登録で500ポイントプレゼント</div>

<header class="site-header">
  <div class="header-row">
    <a href="/" class="logo">
      <img src="__STYLE__/css/suni_logo-041.png" alt="SUNISUKI">
    </a>
    <form class="search-form" role="search">
      <input type="text" placeholder="商品名・キーワードで検索">
      <button type="submit" aria-label="検索">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </form>
    <div class="header-actions">
      <a href="{:U('My/dashboard')}">
        <svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <a href="{:U('Cart/index')}">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span class="cart-count" id="cart-count"></span>
      </a>
    </div>
  </div>
  <nav class="main-nav">
    <ul>
      <li><a href="/">トップ</a></li>
      <li><a href="{:U('Product/list')}">商品一覧</a></li>
      <li><a href="{:U('My/brand')}">ブランド</a></li>
      <li><a href="{:U('My/article')}">ジャーナル</a></li>
      <li><a href="{:U('My/faq')}">よくあるご質問</a></li>
    </ul>
  </nav>
</header>

<main class="container">
  <div class="breadcrumb">
    <a href="/">トップ</a><span>›</span>
    <a href="{:U('My/dashboard')}">マイページ</a><span>›</span>メッセージ
  </div>
  <div class="mypage-layout">
    <include file="User:aside"/>
    <section>
      <h1 style="font-size:24px;margin-bottom:18px;">站内メッセージ</h1>
      <if condition="!empty($list)">
        <volist name="list" id="m">
          <a href="{:U('My/messageDetail', array('id'=>$m['id']))}" class="order-row" style="background:var(--white);color:inherit">
            <div class="chat-avatar">蔵</div>
            <div class="meta">
              <div class="name">{$m.title}</div>
              <div class="date">{$m.last_message}</div>
            </div>
            <span style="font-size:12px;color:var(--ink-soft)">{$m.updated_at|date="Y-m-d H:i",###}</span>
          </a>
        </volist>
      <else />
        <div class="mypage-panel">
          <h3>メッセージ</h3>
          <div style="padding:30px 20px;text-align:center;color:var(--ink-soft)">まだメッセージがありません</div>
        </div>
      </if>
    </section>
  </div>
</main>

<include file="Home:footer"/>
