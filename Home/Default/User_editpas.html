<link rel="stylesheet" href="{$site_url}__STYLE__/user/user.css"/>
<style>
 
#right_box input[type="text"],#right_box input[type="email"], #right_box input[type="tel"], #right_box input[type="password"] {
    padding: 6px 5px;
	height:auto;
}
</style>


<div id="mypage">
    <ul class="bread clearfix">
        <li><a href="/">TOP</a></li>
        <li>マイページTOP </li>
    </ul>
    <h2>マイページ</h2>
    <!-- マイページメイン Start -->
    <div id="mypage_main" class="clearfix">
        <include file="User:menu" />
        

        <!--  右カラム Start  -->
        <div id="right_box">
            <include file="User:nav" />
            <h3>パスワードを変更します</h3>
            <form action="#" method="post" id="loginForm" name="entry">

                <div class="change_pass">
                    <p>現在のパスワードと、新しいパスワードを以下にご入力下さい。</p>
                    <p class="errorText">新しいパスワードは８文字以上で設定してください。<br>数字と英字を混ぜた文字列を設定してください。</p>
<div data-form-error="" class="globalErrorSlot">
</div>
                    <dl class="clearfix">
                        <dt>現在のパスワード</dt>
                        <dd>            <input type="password" id="oldPassword" name="oldPassword" value="" class="sampleValue" maxlength="20" data-verify-as="{&quot;allowempty&quot;:false,&quot;minlength&quot;:8,&quot;maxlength&quot;:20,&quot;format&quot;:&quot;password&quot;}" placeholder="" formnovalidate="" style="background-color: rgb(255, 192, 203);" tabindex="3"><span data-check-for="oldPassword" class="check"></span>

<br></dd>
                        <dt>新しいパスワード</dt>
                        <dd>
<input type="password" id="newPassword" name="newPassword" value="" class="sampleValue" maxlength="20" data-verify-as="{&quot;allowempty&quot;:false,&quot;minlength&quot;:8,&quot;maxlength&quot;:20,&quot;format&quot;:&quot;password-mixed&quot;}" placeholder="" formnovalidate="" style="background-color: rgb(255, 192, 203);" tabindex="5" aria-autocomplete="list"><span data-check-for="newPassword" class="check"></span>

<br><span>(半角英数字 8～20文字) <br>※数字と英字を混ぜた文字列を設定してください。</span></dd>
                        <dt>パスワード(確認)</dt>
                        <dd>
<input type="password" id="passwordConfirm" name="passwordConfirm" value="" class="sampleValue" maxlength="20" data-verify-as="{&quot;allowempty&quot;:false,&quot;minlength&quot;:8,&quot;maxlength&quot;:20,&quot;format&quot;:&quot;comparepassword&quot;,&quot;compareWith&quot;:&quot;newPassword&quot;}" placeholder="" formnovalidate="" style="background-color: rgb(255, 192, 203);" tabindex="7"><span data-check-for="passwordConfirm" class="check"></span>

<br><span>※確認のため、同じパスワードを再度入力してください。</span></dd>
                    </dl>
                </div>
                <div class="agreement_check">
                    <p class="agreement_check_text"><a class="agreement_check_link" href="/agreement.html" target="_new">ご利用規約</a>・<a class="agreement_check_link" href="/privacy.html" target="_new">プライバシーポリシー</a>に同意いただいた上で、「パスワードを変更する」ボタンを押してください。</p>
                    <div class="agreement_check_block">
                        <div class="form_checkbox">
                            <div class="form_checkbox_left"><input type="checkbox" id="agreement" name="agreement" tabindex="8"><label for="agreement">ご利用規約及びプライバシーポリシーに同意する</label></div>
                        </div>
                    </div>
                </div>
                <div class="btn">
                    <p><a id="goNextElement" href="javascript:doRegist();">パスワードを変更する</a></p>
                </div>
            </form>
        </div>
        <!--  右カラム End  -->
    </div>
    <!-- マイページメイン Start -->
</div>
<script>
	function doRegist(){
		var oldPassword=$("#oldPassword").val();
		var newPassword=$("#newPassword").val();
		var passwordConfirm=$("#passwordConfirm").val();

		if (oldPassword.length < 1) {
			layer.tips('現在のパスワード', $('input[name="oldPassword"]'), { tips: 1 });
			return false;
		}
		if (newPassword.length < 1) {
			layer.tips('新しいパスワード', $('input[name="newPassword"]'), { tips: 1 });
			return false;
		}
		if (newPassword != passwordConfirm) {
			layer.tips('パスワード(確認)', $('input[name="passwordConfirm"]'), { tips: 1 });
			return false;
		}

		if($('#agreement').is(':checked')) {
   
			var data=$("#loginForm").serialize();
			$.ajax({
				url: 'index.php?m=user&a=editpass',
				type: 'post',
				data:data,
				timeout: 1000,
				dataType:'json',
				success: function(res){
					if(res.status==2){
						layer.msg('正常に変更されました');
						window.location.href='index.php?m=user&a=login';
					}else{
						layer.msg(res.msg);
					}
				}
			});
		}else{
			layer.msg("ご利用規約及びプライバシーポリシーに同意する");
		}

	}
</script>
