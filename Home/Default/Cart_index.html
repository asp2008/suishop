<script>
/* ---- Cart logic ---- */
(function(){

  var unitPrices = { 1: 8800, 2: 3960, 3: 12800 };
  var EXTRA = 330; // gift wrap fixed

  function recalc(){
    var sub = 0;
    var itemCount = 0;
    $(".cart-item:visible").each(function(){
      var id  = $(this).data("id");
      var qty = parseInt($(this).find(".qty-val").val(), 10) || 1;
      var u   = unitPrices[id] || 0;
      var line = u * qty;
      $(this).find(".cart-item-price").text("¥" + line.toLocaleString("ja-JP"));
      sub += line;
      itemCount += qty;
    });
    $("#sumSubtotal").text("¥" + sub.toLocaleString("ja-JP"));
    $("#sumTotal").text("¥" + (sub + EXTRA).toLocaleString("ja-JP"));
    var pts = Math.floor((sub + EXTRA) / 100);
    $(".cart-point-notice strong").text(pts.toLocaleString("ja-JP") + "ポイント");
    $("#cartItemCount").text(itemCount);
    $("#cartCount").text(itemCount);

    if($(".cart-item:visible").length === 0){
      $("#cartLayout").hide();
      $("#cartEmpty").show();
    }
  }

  // qty stepper override for cart (unit price aware)
  $(document).on("click", ".cart-item .minus", function(){
    var $input = $(this).siblings(".qty-val");
    var v = Math.max(1, (parseInt($input.val(),10)||1) - 1);
    $input.val(v); recalc();
  });
  $(document).on("click", ".cart-item .plus", function(){
    var $input = $(this).siblings(".qty-val");
    $input.val((parseInt($input.val(),10)||1) + 1); recalc();
  });
  $(document).on("change", ".cart-item .qty-val", recalc);

  // remove item
  $(document).on("click", ".cart-remove", function(){
    var $item = $(this).closest(".cart-item");
    var id = $item.data("id");
    addCart(id, 0); // remove from cart
    $item.fadeOut(200, function(){ $(this).remove(); recalc(); });
    
  });

  // coupon mock
  $(".coupon-row button").on("click", function(){
    var code = $(".coupon-row input").val().trim().toUpperCase();
    if(code === "KURA10"){
      alert("クーポンコード「KURA10」が適用されました。10%割引が適用されます。");
    } else {
      alert("このクーポンコードは有効ではありません。");
    }
  });

  recalc();
})();
</script>
<script>
  
function addCart(id, num){
    num = num || 1;
    $.ajax({
        url: '/Cart/ajax.html',
        type: 'POST',
        dataType: 'json',
        data: {
            do: 'add',
            id: id,
            num: num
        },
        beforeSend:function(){
            $('.btn-cart').prop('disabled',true);
        },
        success:function(res){
            $('.btn-cart').prop('disabled',false);
            if(res.data==1){
                message("已加入购物车");
                getCartCount();
            }else{
                message(res.msg ? res.msg : '加入失败');
            }
        },
        error:function(){
            //$('.btn-cart').prop('disabled',false');
            message("加入购物车失败");
        }
    });
}
function getCartCount(){
    fetch("/index.php?m=Ajax&a=getCounts")
        .then(response => response.json())
        .then(data => {
            setBadge('msgCount', data.msg);
            setBadge('cart-count', data.cart);
        })
        .catch(err => console.error(err));
}
</script>
