<script>

    function addtohomeCart(id,num,doit){
	var datas={'id':id,'num':num};
	$.ajax({
		type:"POST",
		url: ROOT+"/index.php?g=Wap&m=Cart&a=ajax&do="+doit,
		data: datas,
		timeout:"15000",
		dataType:"JSON",
		success: function(data){
			console.log(data);
			if(data.data==1){
				  location.href="/index.php?g=home&m=cart&a=index";
			}else if(data.data==2){
				layer.msg("更新完了！");
			}else if(data.data==3){
				layer.msg("正常に削除されました！");
					window.location.reload();
			}else{
				alert(doit + ' error'+data.msg);
			}
		},
		error:function(){
			alert("time out,try it");
		}
	});
}
		function orderok(obj){
			return true;
		}

		$(".dels").click(function () {
		var id=$(this).attr("data-id");
            $.get("index.php?m=user&a=del", { id: id }, function (data) {
               layer.msg("削除");
			   window.location.reload();
            }, "text");
    })

</script>
