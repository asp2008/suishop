<!-- 已ログイン会員のお届け先サマリー（Apple 風） -->
<!-- 依赖变量：$user / $Area / $token -->
<div class="checkout-section" style="margin-bottom:18px">
  <h3>会員お届け先サマリー
    <a href="{:U('My/address')}" style="font-size:12px;color:var(--blue);font-weight:400;">住所を編集</a>
  </h3>
  <div class="body">
    <div class="addr-row selected" style="cursor:default">
      <div class="check"></div>
      <div class="name">
        {$user.consignee1} {$user.consignee2|default=''}
        <span class="badge badge-blue" style="position:static;margin-left:6px;font-size:10px;">会員既定</span>
      </div>
      <div class="meta">
        {$user.province|getArea} {$user.address1} {$user.address2} {$user.address3}<br>
        メール：{$user.email}　　TEL：{$user.mobile|default=$user['tel1']}<br>
        〒 {$user.zip}
      </div>
    </div>
    <p style="font-size:12px;color:var(--ink-soft);margin-top:12px;margin-bottom:0">
      ※ 他の住所を使うには <a href="{:U('My/address')}" style="color:var(--blue);">住所一覧</a> から既定を変更してください。
    </p>
  </div>
</div>

<!-- 隐藏字段：将会员信息透传给 Cart/done -->
<input type="hidden" name="email"        value="{$user.email}">
<input type="hidden" name="consignee1"   value="{$user.consignee1}">
<input type="hidden" name="consignee2"   value="{$user.consignee2}">
<input type="hidden" name="tel1"         value="{$user.tel1|default=$user['mobile']}">
<input type="hidden" name="mobile"       value="{$user.mobile|default=$user['tel1']}">
<input type="hidden" name="province"     value="{$user.province}">
<input type="hidden" name="address1"     value="{$user.address1}">
<input type="hidden" name="address2"     value="{$user.address2}">
<input type="hidden" name="address3"     value="{$user.address3}">
<input type="hidden" name="zip"          value="{$user.zip}">
<input type="hidden" name="sex"          value="{$user.sex}">
