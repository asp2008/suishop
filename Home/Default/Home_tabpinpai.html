<div class="goods_list_btn" id="load-more-btn" style="display:none;">
    <a href="javascript:void(0);" id="load-more-link">もっと見る</a>
</div>

<script>
$(function () {
    const pageMap = { 'protype': 1, 'pinpai': 1 };
    const limit = 6;
    let currentType = $(".commlist").data("type");
    let _url = $(".commlist").data("url");
    const $_userid=$(".commlist").data('userid');
    const $loadMoreBtn = $("#load-more-btn");

    var template = `
        <div class="panel panel-info" data-id="{{id}}">
            <div class="panel-heading clearfix">
                <a href="{{product_url}}" target="_blank" class="as">
                    <img class="ims" src="{{first_img}}" alt="{{product_title}}">
                </a>
                <div class="info1">
                    <a href="{{product_url}}" target="_blank" title="{{product_title}}">{{product_title}}</a>
                    <span id="conte">{{content}}</span>
                    <span class="bt">{{author}} 投稿日: {{date}} <span class="star c-star size1 star{{stars}}"></span></span>
                </div>
            </div>
            <div class="clearfix"></div>
            {{reply_html}}
        </div>
    `;

    loadComments(currentType, true);

    $('#load-more-btn').on('click', function () {
         if($_userid == 0){
            $loadMoreBtn.find('a').attr('href', '/home/user/login.html');
            $loadMoreBtn.find('a').text('もっと見る（ログインが必要です）');
            return;
        }
        var $link = $('#load-more-link');
        if ($link.hasClass('loading')) return;
        $link.addClass('loading').text('読み込み中...');
        loadComments(currentType, false, function () {
            $link.removeClass('loading').text('もっと見る');
        });
    });

    function loadComments(type, isFirstLoad, done) {
        const page = pageMap[type];

        $.ajax({
            url: _url,
            data: { type: type, page: page, limit: limit },
            dataType: 'json',
            method: 'POST',
            success: function (res) {
                const list = res.list;
                const hasMore = res.has_more;

                if (isFirstLoad && list.length === 0) {
                    $('.commlists').html('<p style="text-align:center;">レビューがありません。</p>');
                    $('#load-more-btn').hide();
                    return;
                }

                let html = '';
                list.forEach(function (c) {
                    var firstImg = (c.images && c.images.length > 0) ? c.images[0] : c.product_img;

                    var replyHtml = '';
                    if (c.description && c.description.trim() !== '') {
                        replyHtml = '<div style="font-size:11px;background:#ddd;padding:10px;">' +
                                    '<b>店長からの返信:</b> ' + c.description +
                                    '<div class="clearfix"></div></div>';
                    }

                    var item = template
                        .replace(/{{id}}/g, c.id)
                        .replace(/{{product_url}}/g, c.product_url)
                        .replace(/{{first_img}}/g, firstImg)
                        .replace(/{{product_title}}/g, c.product_title)
                        .replace(/{{content}}/g, c.content)
                        .replace(/{{author}}/g, c.author)
                        .replace(/{{date}}/g, c.date)
                        .replace(/{{stars}}/g, c.stars)
                        .replace(/{{reply_html}}/g, replyHtml);

                    html += item;
                });

                $('.commlists').append(html);

                if (hasMore) {
                    $('#load-more-btn').show();
                    pageMap[type] += 1;
                } else {
                    $('#load-more-btn').hide();
                }
                if (done) done();
            },
            error: function () {
                console.log('読み込みに失敗しました。');
                if (done) done();
            }
        });
    }
});
</script>

	$(".cot ul").eq(idx - 1).show();
