<script>
    $(".upd_img_upload").change(function(){   
         var files = $(this).get(0).files[0];
         if(files.size > 5*1024*1024){
             layer.msg("画像サイズは4mを超えることはできません");
             return false;
         }
         var idx=$(this).attr("data-id");
         var reader = new FileReader();
         reader.readAsDataURL(files);
         var formData = new FormData();
         formData.append("__source", files);
         var _that=$(this);
         $.ajax({
             url:'?g=home&m=user&a=upload',
             dataType:'json',
             type:'POST',
             async: false,
             data:formData,
             processData : false,
             contentType : false, 
             beforeSend: function (XMLHttpRequest) {
             },
             success: function(res){
                 var data = res.data;
                 if(res.code == 0){
                     $(".thumb_"+idx).val(data.src);
                     $(".imgx_"+idx).attr("data-id",data.src);
                     $(".imgxrc_"+idx).attr("src",data.src);
                     $(".thumbx_"+idx).show();
                 }else{
                     layer.msg(res.msg);
                 }
             },
             error:function(response){
                 layer.msg(response);
             }
         });
     }); 
     $('body').on('click','.thumlist a',function(){
         var _url=$(this).attr("data-id");
         var idx=$(this).attr("data-catid");
         $(this).parent().remove();
         $("#myfiles").attr("readonly",false);
         $("#myfiles").attr("disabled",false);
         $(".thumb_"+idx).val("");
         $.ajax({
             url: 'index.php?m=user&a=delimg',
             type: 'POST',
             data:{id:_url},
             timeout: 1000,
             dataType:'json',
             success: function(res){
                
             }
         });
     });
     var isSubmitting = false;
     function doComent(idx){
         if (isSubmitting) {
             return;
         }
         isSubmitting = true;
         $("#submitButton_"+idx).off('click');
         $("#submitButton_"+idx).text('成功です');
 

 
         var txaComment=$("#txaComment_"+idx).val().replace(/\n/g,"<br />");
         if (txaComment.length < 10) {
             layer.msg('コメントは10文字以内');
             $("#submitButton_"+idx).on('click', function() { doComent(idx); });
             isSubmitting = false;
             return false;
         }
         if ($("#thumb_"+idx).val().length < 1) {
             layer.msg("写真付きレビュー投稿");
             $("#submitButton_"+idx).on('click', function() { doComent(idx); });
             isSubmitting = false;
             return false;
         }
 
         var data=$("#loginForm_"+idx).serialize();
         $.ajax({
             url: 'index.php?m=user&a=addreview',
             type: 'post',
             data: data,
             dataType:'json',
             success: function(res){
                 if(res.status==2){
                     layer.msg('評論することに成功します.審査を待ちます！');
                     window.location.reload();
                 }else{
                     layer.msg(res.msg);
                 }
                 isSubmitting = false;
             }
         });
 }
 
     function doComents(idx){
 
         if ($("#thumb_"+idx).val().length < 1) {
             layer.msg("写真付きレビュー投稿");
             return false;
         }
 
         if ($("#username_"+idx).val().length < 1) {
             layer.msg('ニックネーム！');
             return false;
         }
 
         var txaComment=$("#txaComment_"+idx).val().replace(/\n/g,"<br />");
         if (txaComment.length < 1) {
             layer.msg('例：ウェア太郎');
             return false;
         }
        
         var data=$("#loginForm_"+idx).serialize();
         $.ajax({
             url: 'index.php?m=user&a=addreview',
             type: 'post',
             data: data,
             timeout: 1000,
             dataType:'json',
             success: function(res){
                 if(res.status==2){
                     layer.msg('評論することに成功します.審査を待ちます！');
                     window.location.reload();
                 }else{
                     layer.msg(res.msg);
                 }
             }
         });
     }
     $('.star span').click(function(){
         $(this).parent().find('span').removeClass('on')
         var id=$(this).attr("data-id");
         var index = $(this).index();
         var rating=parseInt(index) + 1;
         $(".rating_"+id).val(rating);
         $(this).parent().find('span').each(function(){
             if(index<0){
                 return
             }
             $(this).addClass('on');
             index--
         });
     });
 </script>
