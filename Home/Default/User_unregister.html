<link rel="stylesheet" href="{$site_url}__STYLE__/user/user.css"/>
<div id="mypage">
    <ul class="bread clearfix">
        <li><a href="/">TOP</a></li>
        <li>退会 </li>
    </ul>
    <h2>退会</h2>
    <!-- マイページメイン Start -->
    <div id="mypage_main" class="clearfix">
        <include file="User:menu" />
        <div id="right_box">
            <form action="#" method="post" name="entry" id="loginForm">

                <h3>退会手続き</h3>
                <div class="withdrawal">
                    <p>退会手続きをいたします。<br>
                    下記注意事項をご確認の上、ボックスにチェックを付け退会手続きを行ってください。</p>
                    <ul>
                        <li><input type="hidden" name="agreeto_check1" value="0">
<input type="checkbox" id="agreeto_check1" name="agreeto_check1" value="1">
<label for="agreeto_check1">個人情報規定ならびに弊社セキュリティーシステム上退会後の会員登録内容の確認はできなくなります。</label></li>
                        <li><input type="hidden" name="agreeto_check2" value="0">
<input type="checkbox" id="agreeto_check2" name="agreeto_check2" value="1">
<label for="agreeto_check2">お持ちのポイントは無効となります。</label></li>
                        <li><input type="hidden" name="agreeto_check3" value="0">
<input type="checkbox" id="agreeto_check3" name="agreeto_check3" value="1">
<label for="agreeto_check3">新しい会員登録へのポイント移行はできません。</label></li>
                        <li><input type="hidden" name="agreeto_check4" value="0">
<input type="checkbox" id="agreeto_check4" name="agreeto_check4" value="1">
<label for="agreeto_check4">既にご注文いただきました商品は、退会後も配送を行わせていただきます。<br>
                        ※配送先・お支払方法・配達日時の変更はできなくなります。<br>※ご登録済のメールマガジンの解除は<a href="#">こちら</a>。</label></li>
                    </ul>
                </div>

                <div class="agreement_check">
                    <p class="agreement_check_text"><a class="agreement_check_link" href="#" target="_new">ご利用規約</a>・<a class="agreement_check_link" href="#" target="_new">プライバシーポリシー</a>に同意いただいた上で、「退会する」ボタンを押してください。</p>
                    <div class="agreement_check_block">
                        <div class="form_checkbox">
                            <div class="form_checkbox_left"><input type="checkbox" id="agreement" name="agreement"><label for="agreement">ご利用規約及びプライバシーポリシーに同意する</label></div>
                        </div>
                    </div>
                </div>
                <div class="allconf">
                    <p id="caution">全ての項目を確認いたしましたか？</p>

                </div>
                <div class="btn">
                    <ul class="clearfix">
                        <li><a href="/index.php?m=user&a=index">退会しない</a></li>
                        <li><a href="javascript:checkAgree(document.forms['entry'])">退会する</a></li>
                    </ul>
                </div>
            </form>
        </div>
        <!--  右カラム End  -->
    </div>
    <!-- マイページメイン Start -->
</div>
<script>
    function checkAgree(forms){
        if($('#agreement').is(':checked')) {
   
            var data=$("#loginForm").serialize();
            $.ajax({
                url: 'index.php?m=user&a=unregister',
                type: 'post',
                data:data,
                dataType:'json',
                success: function(res){
                    if(res.status==2){
                        layer.msg('退会する成功');
                        window.location.href='/';
                    }else{
                        layer.msg(res.msg);
                    }
                }
            });
        }else{
            layer.msg("ご利用規約及びプライバシーポリシーに同意する");
        }
    }
</script>
