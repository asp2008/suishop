<include file="Home:header"/>

<main class="container">
  <div class="auth-wrap">

    <h1>新規会員登録</h1>
    <p class="auth-sub">会員登録で初回 <strong style="color:var(--blue);">500ポイント</strong> プレゼント中</p>

    <form id="registerForm" novalidate autocomplete="on">

      <!-- 氏名 -->
      <div class="field-row">
        <div class="field" id="fieldLastName">
          <label for="regLastName">姓<span class="req">必須</span></label>
          <input type="text" id="regLastName" name="lastName"
                 autocomplete="family-name" placeholder="山田">
          <div class="field-error">姓を入力してください</div>
        </div>
        <div class="field" id="fieldFirstName">
          <label for="regFirstName">名<span class="req">必須</span></label>
          <input type="text" id="regFirstName" name="firstName"
                 autocomplete="given-name" placeholder="花子">
          <div class="field-error">名を入力してください</div>
        </div>
      </div>

      <!-- メール -->
      <div class="field" id="fieldEmail">
        <label for="regEmail">メールアドレス<span class="req">必須</span></label>
        <input type="email" id="regEmail" name="email"
               autocomplete="email" placeholder="例）kuraichi@example.com">
        <div class="field-error" id="errRegEmail">メールアドレスを正しく入力してください</div>
      </div>

      <!-- 電話番号 -->
      <div class="field" id="fieldTel">
        <label for="regTel">電話番号<span class="req">必須</span></label>
        <input type="tel" id="regTel" name="tel"
               autocomplete="tel" placeholder="例）090-1234-5678">
        <div class="field-error">正しい電話番号を入力してください</div>
      </div>

      <!-- パスワード -->
      <div class="field" id="fieldPw">
        <label for="regPassword">パスワード<span class="req">必須</span></label>
        <div style="position:relative;">
          <input type="password" id="regPassword" name="password"
                 autocomplete="new-password"
                 placeholder="8文字以上（英数字混在）"
                 style="padding-right:46px;">
          <button type="button" id="toggleRegPw" aria-label="パスワードを表示/非表示"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                         background:none;border:none;color:var(--ink-soft);display:flex;padding:0;">
            <svg id="regPwEye" class="icon" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- パスワード強度バー -->
        <div style="display:flex;gap:4px;margin-top:8px;" id="pwStrengthBars">
          <div style="flex:1;height:4px;border-radius:2px;background:var(--line);" class="bar"></div>
          <div style="flex:1;height:4px;border-radius:2px;background:var(--line);" class="bar"></div>
          <div style="flex:1;height:4px;border-radius:2px;background:var(--line);" class="bar"></div>
          <div style="flex:1;height:4px;border-radius:2px;background:var(--line);" class="bar"></div>
        </div>
        <div style="font-size:11.5px;color:var(--ink-soft);margin-top:5px;" id="pwStrengthLabel">パスワードを入力してください</div>
        <div class="field-error">パスワードは8文字以上、英字と数字を含めて入力してください</div>
      </div>

      <!-- パスワード確認 -->
      <div class="field" id="fieldPwConfirm">
        <label for="regPasswordConfirm">パスワード（確認）<span class="req">必須</span></label>
        <input type="password" id="regPasswordConfirm" name="passwordConfirm"
               autocomplete="new-password" placeholder="同じパスワードを再入力">
        <div class="field-error" id="errPwConfirm">パスワードが一致しません</div>
      </div>

      <!-- 利用規約 -->
      <div class="checkbox-line" id="checkTermsWrap"
           style="border:1.5px solid transparent;border-radius:var(--radius-sm);padding:4px 8px;transition:.2s;">
        <input type="checkbox" id="agreeTerms"
               style="width:14px;height:14px;accent-color:var(--blue);flex-shrink:0;">
        <span>
          <a href="#" id="termsLink">利用規約</a>および
          <a href="#" id="privacyLink">プライバシーポリシー</a>に同意します
        </span>
      </div>

      <!-- メルマガ -->
      <div class="checkbox-line" style="margin-bottom:24px;">
        <input type="checkbox" id="agreeNewsletter" checked
               style="width:14px;height:14px;accent-color:var(--blue);flex-shrink:0;">
        <span>お得なキャンペーン・新着情報のメールを受け取る</span>
      </div>

      <button type="submit" class="btn btn-dark btn-block" id="registerBtn">登録する</button>
    </form>

    <p class="form-foot-link" style="margin-top:20px;">
      すでに会員の方は <a href="login.html">ログイン</a> へ
    </p>
  </div>
</main>
<link rel="stylesheet" href="{$site_url}__STYLE__/css/dialog.css">
<script src="{$site_url}__STYLE__/js/jquery-3.7.1.min.js" charset="UTF-8"></script>
<script src="{$site_url}__STYLE__/js/dialog.js"></script>
<script>
$(function () {

  /* ── API エンドポイント（実際のURLに変更してください）── */
  var API_REGISTER = '/account/register.html';

  /* ── パスワード表示切り替え ── */
  var pwVis = false;
  $('#toggleRegPw').on('click', function () {
    pwVis = !pwVis;
    $('#regPassword').attr('type', pwVis ? 'text' : 'password');
    $('#regPwEye').html(pwVis
      ? '<path d="M17.9 17.4A10 10 0 0 1 1 12s.5-1.1 1.5-2.4M6.5 6.1A10 10 0 0 1 23 12s-4 8-11 8c-1.6 0-3-.3-4.3-.8M1 1l22 22"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>');
  });

  /* ── パスワード強度 ── */
  var PW_STRENGTH = ['', '弱い', '普通', '強い', '非常に強い'];
  var PW_COLORS   = ['var(--line)', 'var(--red)', '#F59E0B', '#22C55E', '#22C55E'];

  $('#regPassword').on('input', function () {
    var v = $(this).val();
    var score = 0;
    if (v.length >= 8)          score++;
    if (/[A-Za-z]/.test(v))     score++;
    if (/[0-9]/.test(v))        score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;

    $('#pwStrengthBars .bar').each(function (i) {
      $(this).css('background', i < score ? PW_COLORS[score] : 'var(--line)');
    });
    $('#pwStrengthLabel')
      .text(v.length === 0 ? 'パスワードを入力してください' : '強度：' + (PW_STRENGTH[score] || '入力中…'))
      .css('color', v.length === 0 ? 'var(--ink-soft)' : PW_COLORS[score]);
  });

  /* ── フィールドバリデーション ── */
  var RULES = {
    regLastName      : function (v) { return v.trim().length > 0; },
    regFirstName     : function (v) { return v.trim().length > 0; },
    regEmail         : function (v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()); },
    regTel           : function (v) { return /^[\d\-\+\(\)\s]{7,}$/.test(v.trim()); },
    regPassword      : function (v) { return v.length >= 8 && /[A-Za-z]/.test(v) && /[0-9]/.test(v); },
    regPasswordConfirm: function (v) { return v === $('#regPassword').val(); }
  };

  function validateField(id) {
    var ok = RULES[id] ? RULES[id]($('#' + id).val()) : true;
    $('#' + id).closest('.field').toggleClass('has-error', !ok);
    return ok;
  }

  function validateAll() {
    var results = Object.keys(RULES).map(validateField);
    /* 利用規約チェック */
    var agreed = $('#agreeTerms').is(':checked');
    if (!agreed) {
      $('#checkTermsWrap').css('border-color', 'var(--red)');
    } else {
      $('#checkTermsWrap').css('border-color', 'transparent');
    }
    return results.every(Boolean) && agreed;
  }

  /* リアルタイムバリデーション */
  Object.keys(RULES).forEach(function (id) {
    $('#' + id).on('blur', function () { validateField(id); });
  });
  $('#regPasswordConfirm').on('input', function () {
    if ($('#regPasswordConfirm').val()) validateField('regPasswordConfirm');
  });
  $('#agreeTerms').on('change', function () {
    $('#checkTermsWrap').css('border-color', $(this).is(':checked') ? 'transparent' : 'var(--red)');
  });

  /* ── 利用規約 / プライバシーポリシー ダイアログ ── */
  $('#termsLink').on('click', function (e) {
    e.preventDefault();
    KuraDialog.show({
      type   : 'info',
      title  : '利用規約',
      message: '<div style="text-align:left;font-size:13px;line-height:1.8;max-height:300px;overflow-y:auto;">'
             + '<p><strong>第1条（目的）</strong><br>本規約は、蔵市（以下「当社」）が提供するオンラインショッピングサービス（以下「本サービス」）の利用条件を定めるものです。</p>'
             + '<p><strong>第2条（会員登録）</strong><br>本サービスの利用には会員登録が必要です。登録情報は正確に入力してください。</p>'
             + '<p><strong>第3条（禁止事項）</strong><br>不正アクセス、虚偽情報の登録、著作権侵害行為等を禁止します。</p>'
             + '<p>（以下省略）</p></div>',
      actions: [{ label: '閉じる', style: 'primary' }],
      size   : 'lg'
    });
  });

  $('#privacyLink').on('click', function (e) {
    e.preventDefault();
    KuraDialog.show({
      type   : 'info',
      title  : 'プライバシーポリシー',
      message: '<div style="text-align:left;font-size:13px;line-height:1.8;max-height:300px;overflow-y:auto;">'
             + '<p>当社は、お客様の個人情報を適切に保護・管理することを最重要事項として位置付け、個人情報保護法を遵守します。</p>'
             + '<p><strong>収集する情報</strong><br>氏名、メールアドレス、住所、電話番号、購入履歴など。</p>'
             + '<p><strong>利用目的</strong><br>注文処理、サービス向上、マーケティング（同意がある場合）のために使用します。</p>'
             + '<p>（以下省略）</p></div>',
      actions: [{ label: '閉じる', style: 'primary' }],
      size   : 'lg'
    });
  });

  /* ── メインフォーム送信 ── */
  $('#registerForm').on('submit', function (e) {
    e.preventDefault();
    if (!validateAll()) {
      /* 最初のエラーフィールドへスクロール */
      var $firstErr = $('.field.has-error').first();
      if ($firstErr.length) {
        $('html, body').animate({ scrollTop: $firstErr.offset().top - 100 }, 300);
      }
      return;
    }

    var $btn    = $('#registerBtn');
    var restore = KuraDialog.loadingBtn($btn, '登録中…');

    var payload = {
      lastName        : $('#regLastName').val().trim(),
      firstName       : $('#regFirstName').val().trim(),
      email           : $('#regEmail').val().trim(),
      tel             : $('#regTel').val().trim(),
      password        : $('#regPassword').val(),
      newsletterOptIn : $('#agreeNewsletter').is(':checked')
    };

   $.ajax({
      url        : API_REGISTER,
      method     : 'POST',
      contentType: 'application/json',
      data       : JSON.stringify(payload),
      timeout    : 15000
    })
    .done(function (res) {
      restore();
      
      if (res.code === 200) {
        KuraDialog.show({
          type    : 'success',
          title   : '会員登録が完了しました！',
          message : '<strong>' + payload.email + '</strong> 宛に確認メールをお送りしました。<br>'
                  + 'メール内のリンクをクリックして登録を完了してください。<br><br>'
                  + '初回登録ボーナスとして <strong style="color:var(--blue);">500ポイント</strong> を付与します。',
          closable: false,
          actions : [
            { label: 'ログインページへ', style: 'primary', onClick: function (close) {
                close();
                window.location.href = 'login.html';
              }
            }
          ]
        });
        return;
      }

      if (res.code === 409) {
        KuraDialog.show({
          type   : 'warning',
          title  : 'このメールアドレスはすでに登録されています',
          message: '<strong>' + payload.email + '</strong> はすでに会員として登録されています。<br>'
                 + 'ログインするか、パスワードをリセットしてください。',
          actions: [
            { label: 'ログインページへ', style: 'primary', onClick: function (close) {
                close();
                window.location.href = 'login.html?email=' + encodeURIComponent(payload.email);
              }
            },
            { label: 'パスワードをリセット', style: 'outline', onClick: function (close) {
                close();
                KuraDialog.toast({
                  type   : 'info',
                  title  : 'パスワードリセットメールを送信しました',
                  message: payload.email + ' 宛に送信しました。'
                });
              }
            },
            { label: '別のメールアドレスで登録', style: 'ghost', onClick: function (close) {
                close();
                $('#regEmail').val('').focus();
                $('#fieldEmail').addClass('has-error');
              }
            }
          ]
        });
        return;
      }

      if (res.code === 422) {
        var fieldErrors = res.errors || {};
        var messages = [];
        if (fieldErrors.email)    messages.push('・' + fieldErrors.email);
        if (fieldErrors.password) messages.push('・' + fieldErrors.password);
        if (fieldErrors.tel)      messages.push('・' + fieldErrors.tel);

        KuraDialog.show({
          type   : 'error',
          title  : '入力内容を確認してください',
          message: messages.length
            ? messages.join('<br>')
            : (res.message || '入力内容に誤りがあります。'),
          actions: [{ label: '確認して修正する', style: 'primary' }]
        });
        return;
      }

      if (res.code === 429) {
        KuraDialog.show({
          type   : 'warning',
          title  : 'しばらく時間をおいてください',
          message: '短時間に多くのリクエストが送信されました。<br>数分後に再度お試しください。',
          actions: [{ label: 'わかりました', style: 'primary' }]
        });
        return;
      }

      KuraDialog.show({
        type   : 'error',
        title  : 'エラーが発生しました',
        message: res.message || '登録処理中に問題が発生しました。しばらく経ってから再度お試しください。',
        actions: [{ label: '閉じる', style: 'primary' }]
      });
    })
    .fail(function (xhr) {
      restore();
      
      KuraDialog.show({
        type   : 'error',
        title  : '通信エラーが発生しました',
        message: 'サーバーへの接続に失敗しました。<br>ページを再読み込みして、もう一度お試しください。',
        actions: [
          { label: '再試行', style: 'primary', onClick: function (close) {
              close(); 
              $('#registerForm').trigger('submit');
            }
          },
          { label: 'ページを再読み込み', style: 'ghost', onClick: function () {
              location.reload();
            }
          }
        ]
      });
    });
  });

});
</script>
<include file="Home:footer"/>
