<style>
.player-vmask{
    position:fixed;
    inset:0;
    z-index:99999;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.55);
    opacity:0;
    visibility:hidden;
    transition:.35s;
}
.player-vmask.show{
    opacity:1;
    visibility:visible;
}
.glass-player{
    position:relative;
    width:min(92vw,430px);
    height:auto;
    overflow:hidden;
    border-radius:32px;
    background:#000;
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:
        0 25px 80px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.25);
    transform:scale(.9);
    transition:.35s;
}
.player-vmask.show .glass-player{
    transform:scale(1);
}
video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:#000;
    display:block;
}
.video-loading{
    position:absolute;
    inset:0;
    z-index:100;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:14px;
    background:rgba(0,0,0,.25);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);
    color:#fff;
    transition:.3s;
}
.video-loading.hide{
    opacity:0;
    visibility:hidden;
}
.loading-spinner{
    width:48px;
    height:48px;
    border-radius:50%;
    border:3px solid rgba(255,255,255,.15);
    border-top-color:#fff;
    animation:spin .8s linear infinite;
}
.loading-text{
    font-size:14px;
}
.loading-percent{
    font-size:13px;
    opacity:.8;
}
@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
.controls{
    position:absolute;
    inset:0;
    transition:.3s;
}
.controls.hide{
    opacity:0;
    pointer-events:none;
}
.top-bar{
    position:absolute;
    top:18px;
    left:15px;
    right:15px;
    display:flex;
    justify-content:space-between;
}
.top-btn{
    width:42px;
    height:42px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    cursor:pointer;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.2);
}
.bottom-bar{
    position:absolute;
    left:20px;
    right:20px;
    bottom:20px;
}
.progress-wrap{
    height:8px;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    background:rgba(255,255,255,.25);
}
.progress{
    width:0;
    height:100%;
    background:#fff;
}
.bottom-actions{
    margin-top:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.time{
    color:#fff;
    font-size:13px;
}
.action-group{
    display:flex;
    gap:10px;
}
.control-btn{
    width:40px;
    height:40px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    cursor:pointer;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.2);
}
.play-btn{
    width:40px;
    height:40px;
}
</style>

<script>
document.addEventListener('click',function(e){
    const _vthumb=e.target.closest('.video-show');
    if(!_vthumb) return;
    createPlayer(
        _vthumb.dataset.video,
        _vthumb.dataset.thumb
    );
});
function formatTime(sec){
    sec=Math.floor(sec||0);
    let m=Math.floor(sec/60);
    let s=sec%60;
    return String(m).padStart(2,'0')
        +':'
        +String(s).padStart(2,'0');
}
function createPlayer(src,poster){
    if(document.getElementById('vmask')) return;
    document.body.insertAdjacentHTML('beforeend',`
    <div class="player-vmask" id="vmask">
        <div class="glass-player">
            <video
                id="_video"
                playsinline
                webkit-playsinline
                preload="metadata"
                poster="${poster}"
                src="${src}">
            </video>
            <div class="video-loading" id="loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">
                    Loading...
                </div>
            </div>
            <div class="controls" id="controls">
                <div class="top-bar">
                    <div
                    class="top-btn"
                    id="_closeBtn">
                        ✕
                    </div>
   
                </div>
                <div class="bottom-bar">
                    <div
                    class="progress-wrap"
                    id="progressWrap">
                        <div
                        class="progress"
                        id="progress"></div>
                    </div>
                    <div class="bottom-actions">
                        <div
                        class="time"
                        id="time">
                            00:00 / 00:00
                        </div>
                        <div class="action-group">
                            <div
                            class="control-btn"
                            id="muteBtn">
                                🔇
                            </div>
                            <div
                            class="control-btn play-btn"
                            id="playBtn">
                                ▶
                            </div>
                            <div
                            class="control-btn"
                            id="unmuteBtn">
                                🔊
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    `);
    bindPlayer();
    requestAnimationFrame(()=>{
        vmask.classList.add('show');
        setTimeout(()=>{
            _video.play().catch(()=>{});
			_video.muted=true;
        },250);
    });
}
function bindPlayer(){
    const vmask=document.getElementById('vmask');
    const _video=document.getElementById('_video');
    const loading=document.getElementById('loading');
    const controls=document.getElementById('controls');
    const playBtn=document.getElementById('playBtn');
    const progress=document.getElementById('progress');
    const progressWrap=document.getElementById('progressWrap');
    let timer;
    function showControls(){
        controls.classList.remove('hide');
        clearTimeout(timer);
        if(!_video.paused){
            timer=setTimeout(()=>{
                controls.classList.add('hide');
            },3000);
        }
    }
    function closePlayer(){
        _video.pause();
        vmask.classList.remove('show');
        setTimeout(()=>{
            vmask.remove();
        },350);
    }
    document.getElementById('_closeBtn').onclick=closePlayer;
    vmask.onclick=function(e){
        if(e.target===vmask){
            closePlayer();
        }
    };
    document.getElementById('muteBtn').onclick=function(){
        _video.muted=true;
    };
    document.getElementById('unmuteBtn').onclick=function(){
        _video.muted=false;
    };
    playBtn.onclick=function(){
        if(_video.paused){
            _video.play();
        }else{
            _video.pause();
        }
    };
    _video.onclick=function(){
        controls.classList.toggle('hide');
    };
    _video.addEventListener('play',function(){
        playBtn.innerHTML='❚❚';
        showControls();
    });
    _video.addEventListener('pause',function(){
        playBtn.innerHTML='▶';
        controls.classList.remove('hide');
    });
    _video.addEventListener('playing',function(){
        loading.classList.add('hide');
    });
    _video.addEventListener('waiting',function(){
        loading.classList.remove('hide');
    });
    _video.addEventListener('timeupdate',function(){
        const p=
        (_video.currentTime/_video.duration)*100||0;
        progress.style.width=p+'%';
        document.getElementById('time').innerHTML=
            formatTime(_video.currentTime)
            +' / '+
            formatTime(_video.duration);
    });
    progressWrap.onclick=function(e){
        const rect=this.getBoundingClientRect();
        const p=(e.clientX-rect.left)/rect.width;
        _video.currentTime=
            _video.duration*p;
    };
}
</script>
