<include file="Home:header"/>
<main class="container">
  <div class="auth-wrap">

    <h1>ログイン</h1>
    <p class="auth-sub">会員様はメールアドレスでログインしてください</p>

    <form id="loginForm" novalidate autocomplete="on">
      <div class="field">
        <label for="loginEmail">メールアドレス<span class="req">必須</span></label>
        <input type="email" id="loginEmail" name="email" autocomplete="email" placeholder="例）kuraichi@example.com">
        <div class="field-error">メールアドレスを正しく入力してください</div>
      </div>
      
      <div class="field">
        <label for="loginPassword">パスワード<span class="req">必須</span></label>
        <div style="position:relative;">
          <input type="password" id="loginPassword" name="password" autocomplete="current-password" placeholder="4文字以上で入力してください" style="padding-right:46px;">
          <button type="button" id="togglePw" aria-label="パスワードを表示/非表示"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                         background:none;border:none;color:var(--ink-soft);display:flex;padding:0;">
            <svg id="pwEyeIcon" class="icon" viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="field-error">パスワードは4文字以上で入力してください</div>
      </div>
      
      <div class="checkbox-line">
        <label style="display:flex;align-items:center;gap:8px;margin:0;">
          <input type="checkbox" id="rememberMe" style="width:14px;height:14px;accent-color:var(--blue);"> ログイン状態を保持する
        </label>
        <span style="flex:1;"></span>
        <a href="#" id="forgotPwLink">パスワードをお忘れですか？</a>
      </div>
      <button type="submit" class="btn btn-dark btn-block" id="loginBtn">ログイン</button>
    </form>

    <div class="divider-or">または</div>

    <p class="form-foot-link">会員登録がまだの方は <a href="/account/register.html">新規会員登録</a> へ</p>
  </div>
</main>
<link rel="stylesheet" href="{$site_url}__STYLE__/css/dialog.css">
<script src="{$site_url}__STYLE__/js/jquery-3.7.1.min.js" charset="UTF-8"></script>
<script src="{$site_url}__STYLE__/js/dialog.js"></script>
<script>
$(function () {

  var API_LOGIN = '/account/login.html'; 

  var pwVisible = false;
  $('#togglePw').on('click', function () {
    pwVisible = !pwVisible;
    $('#loginPassword').attr('type', pwVisible ? 'text' : 'password');
    $('#pwEyeIcon').html(pwVisible
      ? '<path d="M17.9 17.4A10 10 0 0 1 1 12s.5-1.1 1.5-2.4M6.5 6.1A10 10 0 0 1 23 12s-4 8-11 8c-1.6 0-3-.3-4.3-.8M1 1l22 22"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>');
  });

  function validateField(id, checkFn) {
    var $field = $('#' + id).closest('.field');
    var ok = checkFn($('#' + id).val());
    $field.toggleClass('has-error', !ok);
    return ok;
  }

  function validateAll() {
    var email = validateField('loginEmail', function (v) {
      return v.trim().length > 0 && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
    });
    var pw = validateField('loginPassword', function (v) {
      return v.length >= 4;
    });
    return email && pw;
  }

  $('#loginEmail').on('blur', function () {
    validateField('loginEmail', function (v) {
      return v.trim().length > 0 && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
    });
  });
  $('#loginPassword').on('blur', function () {
    validateField('loginPassword', function (v) { return v.length >= 4; });
  });

  $('#forgotPwLink').on('click', function (e) {
    e.preventDefault();
    var inputId = 'kcForgotEmail';
    KuraDialog.show({
      type    : 'info',
      title   : 'パスワードをリセット',
      message : '登録済みのメールアドレスを入力してください。<br>再設定用リンクをお送りします。',
      content : $('<div style="margin:-8px 0 0;"></div>').append(
        $('<input type="email" autocomplete="email" placeholder="例）kuraichi@example.com">')
          .attr('id', inputId)
          .css({ width:'100%', padding:'13px 16px', border:'1.5px solid var(--line)',
                 borderRadius:'var(--radius-sm)', fontSize:'14px',
                 background:'var(--bg-alt)', marginTop:'12px' })
          .on('focus', function(){ $(this).css('borderColor','var(--blue)'); })
          .on('blur',  function(){ $(this).css('borderColor','var(--line)'); })
      ),
      actions : [
        {
          label : 'リセットメールを送信',
          style : 'primary',
          onClick: function (close, $btn) {
            var email = $('#' + inputId).val().trim();
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
              $('#' + inputId).css('borderColor', 'var(--red)');
              return;
            }
            var restore = KuraDialog.loadingBtn($btn, '送信中…');
            setTimeout(function () {
              restore();
              close();
              KuraDialog.toast({
                type   : 'success',
                title  : 'メールを送信しました',
                message: email + ' 宛にパスワードリセットリンクを送りました。'
              });
            }, 1400);
          }
        },
        { label: 'キャンセル', style: 'ghost' }
      ]
    });
    setTimeout(function () { $('#' + inputId).focus(); }, 280);
  });
  $('#loginForm').on('submit', function (e) {
    e.preventDefault();
    if (!validateAll()) return;

    var $btn     = $('#loginBtn');
    var restore  = KuraDialog.loadingBtn($btn, 'ログイン中…');
    var email    = $('#loginEmail').val().trim();
    var password = $('#loginPassword').val();
    var remember = $('#rememberMe').is(':checked');

    $.ajax({
      url        : API_LOGIN,
      method     : 'POST',
      contentType: 'application/json',
      data       : JSON.stringify({ email: email, password: password, remember: remember }),
      timeout    : 15000
    })
    .done(function (res) {
      restore();
      
      if (res.code === 200) {
        KuraDialog.toast({ type: 'success', title: 'ログインしました', message: 'ようこそ！' });
        setTimeout(function () { window.location.href = '/my/index.html'; }, 800);
      } 
      else {
        KuraDialog.show({
          type   : 'error',
          title  : 'ログインできませんでした',
          message: res.message || 'エラーが発生しました。',
          actions: [{ label: '閉じる', style: 'primary' }]
        });
      }
    })
    .fail(function () {
      restore();
      KuraDialog.show({
        type   : 'error',
        title  : '通信エラー',
        message: 'サーバーへの接続に失敗しました。しばらく経ってから再度お試しください。',
        actions: [{ label: '閉じる', style: 'primary' }]
      });
    });
  });

});
</script>
<include file="Home:footer"/>
