<include file="Home:head"/>
<body data-page="message">

<div class="notice-bar">期間限定：全品送料無料キャンペーン実施中｜会員登録で500ポイントプレゼント</div>

<header class="site-header">
  <div class="header-row">
    <a href="/" class="logo">
      <img src="__STYLE__/css/suni_logo-041.png" alt="SUNISUKI">
    </a>
    <div style="flex:1;"></div>
    <div class="header-actions">
      <a href="{:U('My/dashboard')}">
        <svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </a>
      <a href="{:U('Cart/index')}">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span class="cart-count" id="cart-count"></span>
      </a>
    </div>
  </div>
  <nav class="main-nav">
    <ul>
      <li><a href="/">トップ</a></li>
      <li><a href="{:U('Product/list')}">商品一覧</a></li>
      <li><a href="{:U('My/brand')}">ブランド</a></li>
      <li><a href="{:U('My/article')}">ジャーナル</a></li>
      <li><a href="{:U('My/faq')}">よくあるご質問</a></li>
    </ul>
  </nav>
</header>

<main class="container">
  <div class="breadcrumb">
    <a href="/">トップ</a><span>›</span>
    <a href="{:U('My/message')}">メッセージ</a><span>›</span>{$message.title}
  </div>

  <h1 style="font-size:24px;margin-bottom:18px;">{$message.title}</h1>

  <div class="chat-box" style="max-width:760px;margin:0 auto">
    <div class="chat-head">
      <svg viewBox="0 0 24 24" stroke="#EFE7D2" style="width:18px;height:18px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      蔵市 カスタマーサポート
    </div>
    <div class="chat-messages" id="chatMessages" style="max-height:none;min-height:200px">
      <volist name="detail" id="d">
        <div class="chat-msg <if condition='$d[is_admin] eq 0'>me</if>">
          <div class="chat-avatar <if condition='$d[is_admin] eq 0'>me</if>"><if condition="$d['is_admin'] eq 0">私<else />蔵</if></div>
          <div>
            <div class="chat-bubble">{$d.content}</div>
            <div class="chat-time">{$d.createtime|date="Y-m-d H:i",###}</div>
          </div>
        </div>
      </volist>
    </div>
    <div class="chat-input-row">
      <textarea id="chatInput" placeholder="返信を入力してください..." rows="2"></textarea>
      <button type="button" onclick="sendMsg()" aria-label="送信">
        <svg class="icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <p style="text-align:center;margin-top:18px"><a href="{:U('My/message')}" class="btn btn-outline">戻る</a></p>
</main>

<script>
function sendMsg(){
  var text = $.trim($('#chatInput').val());
  if(!text) return;
  var now = new Date();
  var time = now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  var html = '<div class="chat-msg me"><div class="chat-avatar me">私</div><div><div class="chat-bubble"></div><div class="chat-time">'+time+'</div></div></div>';
  var $msg = $(html);
  $msg.find('.chat-bubble').text(text);
  $('#chatMessages').append($msg);
  $('#chatInput').val('');
  var $cm = $('#chatMessages');
  $cm.scrollTop($cm[0].scrollHeight);
}
</script>
<include file="Home:footer"/>
