<include file="Public:header" />

<main class="container">
  <div class="breadcrumb"><a href="{:U('My/index')}">トップ</a><span>›</span><a href="{:U('Account/profile')}">会員情報</a><span>›</span>パスワード変更</div>
  <div class="mypage-layout">
    <aside class="mypage-side">
      <div class="mypage-profile">
        <div class="avatar-ring">{$member.username|mb_substr=0,1,'utf-8'|htmlspecialchars|default='蔵'}</div>
        <div class="name">{$member.realname|default=$member['username']|htmlspecialchars}</div>
      </div>
      <nav class="mypage-nav">
        <a href="{:U('Account/dashboard')}"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/></svg>ダッシュボード</a>
        <a href="{:U('Account/profile')}" class="active"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>会員情報</a>
        <a href="{:U('Account/orders')}"><svg viewBox="0 0 24 24"><path d="M3 3h2l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>注文履歴</a>
        <a href="{:U('Account/address')}"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>お届け先</a>
        <a href="{:U('Account/logout')}"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>ログアウト</a>
      </nav>
    </aside>

    <section>
      <h1 style="font-size:24px;margin-bottom:18px;">パスワード変更</h1>

      <div class="checkout-section" style="max-width:560px">
        <h3>新しいパスワードを設定</h3>
        <div class="body">
          <form action="{:U('Account/password')}" method="post">
            <div class="field">
              <label>現在のパスワード <span class="req">必須</span></label>
              <input type="password" name="old" required>
            </div>
            <div class="field">
              <label>新しいパスワード <span class="req">必須</span></label>
              <input type="password" name="new" required minlength="6" placeholder="6文字以上">
            </div>
            <div class="field">
              <label>新しいパスワード（確認） <span class="req">必須</span></label>
              <input type="password" name="cf" required minlength="6">
            </div>
            <button type="submit" class="btn btn-dark">変更を保存</button>
            <a href="{:U('Account/profile')}" class="btn btn-outline">キャンセル</a>
          </form>
        </div>
      </div>
    </section>
  </div>
</main>

<include file="Public:footer" />
