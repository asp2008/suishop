<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成功</title>
</head>
<body>
<script>
setTimeout(function(){location.href='{$jumpUrl|default="javascript:history.back()"}';}, {$waitSecond|default=3} * 1000);
</script>
<div style="text-align:center;padding:80px 20px;font-family:-apple-system,sans-serif">
  <div style="font-size:60px;color:#34C759">✓</div>
  <h2 style="font-weight:600">{$message|htmlspecialchars}</h2>
  <p style="color:#6E6E73">{$waitSecond|default=3} 秒後に自動的に移動します…</p>
  <p><a href="{$jumpUrl|default="javascript:history.back()"}" style="color:#0071E3">立即跳转</a></p>
</div>
</body>
</html>
