<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{$page_title|htmlspecialchars}</title>
<meta name="keywords" content="{$page_key|default=$site['keywords']|htmlspecialchars}">
<meta name="description" content="{$page_desc|default=$site['description']|htmlspecialchars}">
<link rel="icon" href="__IMG__/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="__CSS__/theme.css?v=1.0">
</head>
<body data-page="{$nav_curr}">

<div class="notice-bar">{$site.notice|htmlspecialchars}</div>

<header class="site-header">
  <div class="header-row">
    <a href="{:U('My/index')}" class="logo">
      <img src="{$site.logo|htmlspecialchars}" alt="{$site.name|htmlspecialchars}" onerror="this.style.display='none';this.parentNode.innerHTML='<span class=\'seal\'>蔵</span><span>'.$site['name'].'</span>';">
    </a>

    <form class="search-form" role="search">
      <label for="searchInput" class="visually-hidden">商品を検索</label>
      <input type="text" id="searchInput" placeholder="商品名・キーワードで検索" autocomplete="off">
      <button type="submit" aria-label="検索">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <div class="search-suggest" id="searchSuggest"></div>
    </form>

    <div class="header-actions">
      <button class="menu-search" aria-label="検索">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>

      <if condition="$is_login">
        <a href="{:U('Account/dashboard')}" data-page="dashboard" aria-label="マイページ">
          <svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
      <else />
        <a href="{:U('Account/login')}" data-page="login" aria-label="ログイン">
          <svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
      </if>

      <a href="{:U('Cart/index')}" data-page="cart" aria-label="カート">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span class="cart-count" id="cartCount">{$cartCount|default=0}</span>
      </a>

      <button class="menu-toggle" aria-label="メニュー" aria-expanded="false">
        <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>

  <nav class="main-nav">
    <ul>
      <li><a href="{:U('My/index')}" data-page="index" <if condition="$nav_curr eq 'index'">class="active"</if>>トップ</a></li>
      <volist name="nav" id="vo">
        <li><a href="{:U('My/lists', array('catid'=>$vo['id']))}">{$vo.catname|htmlspecialchars}</a></li>
      </volist>
      <li><a href="{:U('My/brand')}" data-page="brand">ブランド</a></li>
      <li><a href="{:U('My/article_lists')}" data-page="article">ジャーナル</a></li>
      <li><a href="{:U('My/faq')}" data-page="faq">よくあるご質問</a></li>
      <li><a href="{:U('Cart/index')}" data-page="cart">カート</a></li>
    </ul>
  </nav>
</header>
