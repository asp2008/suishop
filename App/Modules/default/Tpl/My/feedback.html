<include file="Public:header" />

<main class="container">
  <div class="breadcrumb"><a href="{:U('My/index')}">トップ</a><span>›</span>お問い合わせ</div>
  <h1 style="font-size:28px;margin-bottom:6px;">お問い合わせ</h1>
  <p style="color:var(--ink-soft);font-size:13px;margin-bottom:24px;">ご不明な点がございましたら、お気軽にお問い合わせください。2営業日以内にご返信いたします。</p>

  <div class="checkout-section" style="max-width:680px;margin:0 auto">
    <h3>メッセージを送る</h3>
    <div class="body">
      <form action="{:U('My/feedback')}" method="post">
        <div class="field-row">
          <div class="field">
            <label>お名前 <span class="req">必須</span></label>
            <input type="text" name="uname" value="{$member.username|htmlspecialchars}" required>
          </div>
          <div class="field">
            <label>メール <span class="req">必須</span></label>
            <input type="email" name="email" value="{$member.email|htmlspecialchars}" required>
          </div>
        </div>
        <div class="field">
          <label>電話番号</label>
          <input type="tel" name="tel" value="{$member.mobile|htmlspecialchars}">
        </div>
        <div class="field">
          <label>件名 <span class="req">必須</span></label>
          <input type="text" name="title" required placeholder="例：注文についてのお問い合わせ">
        </div>
        <div class="field">
          <label>内容 <span class="req">必須</span></label>
          <textarea name="content" required placeholder="ご質問・ご要望をお書きください"></textarea>
        </div>
        <button type="submit" class="btn btn-dark">送信する</button>
      </form>
    </div>
  </div>

  <div style="max-width:680px;margin:24px auto 60px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <div class="summary-card">
      <svg style="width:24px;height:24px;color:var(--blue);margin:0 auto 8px" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <div class="label">受付時間<br>平日 9:00-18:00</div>
    </div>
    <div class="summary-card">
      <svg style="width:24px;height:24px;color:var(--blue);margin:0 auto 8px" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/></svg>
      <div class="label">{$site.tel|htmlspecialchars}</div>
    </div>
    <div class="summary-card">
      <svg style="width:24px;height:24px;color:var(--blue);margin:0 auto 8px" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div class="label">{$site.email|htmlspecialchars}</div>
    </div>
  </div>
</main>

<include file="Public:footer" />
