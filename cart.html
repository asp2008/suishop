<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カート — JOJOKICKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="jk-header"></div>

<div class="container">
  <nav class="crumb" style="margin-top:16px">
    <a href="index.html">HOME</a>
    <span class="sep">/</span>
    <span>カート</span>
  </nav>
  <h1 style="font-size:26px;margin:6px 0 20px;font-weight:800">ショッピングカート</h1>

  <div class="cart-layout">
    <div id="cart-body"></div>

    <aside class="summary" id="summary">
      <h3>注文サマリー</h3>
      <div class="line"><span>小計</span><span id="sum-sub">¥0</span></div>
      <div class="line"><span>配送</span><span id="sum-ship">FREE</span></div>
      <div class="line"><span>消費税 (10%)</span><span id="sum-tax">¥0</span></div>
      <div class="coupon">
        <input placeholder="クーポンコード" id="coupon-input">
        <button class="btn btn-outline btn-sm" onclick="const v=document.getElementById('coupon-input').value; if(v) JK.toast('クーポンが適用されました · ' + v)">適用</button>
      </div>
      <div class="line total"><span>合計</span><span class="val" id="sum-total">¥0</span></div>
      <a class="btn btn-primary btn-block btn-lg" href="checkout.html" style="margin-top:18px">レジに進む →</a>
      <a class="btn btn-ghost btn-block" href="list.html" style="margin-top:8px;font-size:13px">買い物を続ける</a>
      <button class="btn btn-ghost btn-block" id="clear-cart" style="margin-top:6px;color:var(--text-mute);font-size:12px">カートを空にする</button>

      <div style="margin-top:20px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--text-soft)">
        <p style="margin:0 0 6px">✓ ¥10,000 以上で全国送料無料</p>
        <p style="margin:0 0 6px">✓ 30 日以内返品可能</p>
        <p style="margin:0">✓ 本物保証</p>
      </div>
    </aside>
  </div>
</div>

<div id="jk-footer"></div>

<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
</body>
</html>
