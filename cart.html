<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购物车 — JojoKicks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="jk-header"></div>

<div class="container">
  <nav class="crumb" style="margin-top:24px">
    <a href="index.html">首页</a>
    <span class="sep">/</span>
    <span>购物车</span>
  </nav>
  <h1 style="font-size:36px;margin:8px 0 24px">购物车</h1>

  <div class="cart-layout">
    <div id="cart-body"></div>

    <aside class="summary" id="summary">
      <h3>订单摘要</h3>
      <div class="line"><span>小计</span><span id="sum-sub">$0</span></div>
      <div class="line"><span>运费</span><span id="sum-ship">FREE</span></div>
      <div class="line"><span>税费 (8%)</span><span id="sum-tax">$0</span></div>
      <div class="coupon">
        <input placeholder="优惠码 (NEW10)" id="coupon-input">
        <button class="btn btn-outline" onclick="const v=document.getElementById('coupon-input').value; if(v) JK.toast('优惠码已应用 · ' + v)">应用</button>
      </div>
      <div class="line total"><span>总计</span><span class="val" id="sum-total">$0</span></div>
      <a class="btn btn-gold btn-block btn-lg" href="checkout.html" style="margin-top:20px">前往结账 →</a>
      <a class="btn btn-ghost btn-block" href="list.html" style="margin-top:10px">继续购物</a>
      <button class="btn btn-ghost btn-block" id="clear-cart" style="margin-top:6px;color:var(--text-mute);font-size:12px">清空购物车</button>

      <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--line);font-size:13px;color:var(--text-soft)">
        <p style="margin:0 0 8px">✓ 安全支付 — SSL 加密</p>
        <p style="margin:0 0 8px">✓ 满 $200 全美免邮</p>
        <p style="margin:0">✓ 30 天无理由退换</p>
      </div>
    </aside>
  </div>
</div>

<div id="jk-footer"></div>

<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
</body>
</html>
